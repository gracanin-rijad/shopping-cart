<div class="checkout-container">
  <div class="checkout-header">
    <h1>Checkout</h1>
    <p>Complete your order and enter shipping details.</p>
  </div>

  <form (ngSubmit)="submitOrder()" class="checkout-form">
    <div class="form-row">
      <label for="customerName">Name</label>
      <input id="customerName" name="customerName" [(ngModel)]="customerName" required />
    </div>

    <div class="form-row">
      <label for="customerEmail">Email</label>
      <input id="customerEmail" name="customerEmail" type="email" [(ngModel)]="customerEmail" required />
    </div>

    <div class="form-row">
      <label for="shippingAddress">Shipping Address</label>
      <input id="shippingAddress" name="shippingAddress" [(ngModel)]="shippingAddress" required />
    </div>

    <div class="form-row">
      <label for="city">City</label>
      <input id="city" name="city" [(ngModel)]="city" required />
    </div>

    <div class="form-row">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" [(ngModel)]="notes" rows="4"></textarea>
    </div>

    <div *ngIf="error" class="form-error">{{ error }}</div>

    <button type="submit" class="btn btn-primary btn-large" [disabled]="loading">
      {{ loading ? 'Submitting...' : 'Submit Order' }}
    </button>
  </form>
</div>
